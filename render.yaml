# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard → New + → Blueprint → connect this repo.
# Secret values (sync: false) are entered in the dashboard and never committed.
services:
  - type: web
    name: turuq-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      # Secrets & environment-specific values — set these in the Render dashboard.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: API_PUBLIC_URL # set to the service's public URL after first deploy
        sync: false
